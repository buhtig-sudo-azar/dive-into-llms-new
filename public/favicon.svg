<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="glow" x1="16" y1="16" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bg)"/>
  <!-- Neural network nodes -->
  <!-- Layer 1 (left) -->
  <circle cx="18" cy="20" r="3.5" fill="url(#glow)" opacity="0.9"/>
  <circle cx="18" cy="32" r="3.5" fill="url(#glow)" opacity="0.9"/>
  <circle cx="18" cy="44" r="3.5" fill="url(#glow)" opacity="0.9"/>
  <!-- Layer 2 (middle) -->
  <circle cx="32" cy="16" r="3.5" fill="url(#glow)" opacity="0.95"/>
  <circle cx="32" cy="28" r="4" fill="url(#glow)" opacity="1"/>
  <circle cx="32" cy="40" r="3.5" fill="url(#glow)" opacity="0.95"/>
  <circle cx="32" cy="50" r="3" fill="url(#glow)" opacity="0.85"/>
  <!-- Layer 3 (right) -->
  <circle cx="46" cy="24" r="3.5" fill="url(#glow)" opacity="0.9"/>
  <circle cx="46" cy="40" r="3.5" fill="url(#glow)" opacity="0.9"/>
  <!-- Connections Layer 1→2 -->
  <line x1="21.5" y1="20" x2="28.5" y2="16" stroke="#c4b5fd" stroke-width="1" opacity="0.4"/>
  <line x1="21.5" y1="20" x2="28.5" y2="28" stroke="#c4b5fd" stroke-width="1.2" opacity="0.6"/>
  <line x1="21.5" y1="20" x2="28.5" y2="40" stroke="#c4b5fd" stroke-width="0.8" opacity="0.3"/>
  <line x1="21.5" y1="32" x2="28.5" y2="16" stroke="#c4b5fd" stroke-width="0.8" opacity="0.3"/>
  <line x1="21.5" y1="32" x2="28.5" y2="28" stroke="#c4b5fd" stroke-width="1.2" opacity="0.6"/>
  <line x1="21.5" y1="32" x2="28.5" y2="40" stroke="#c4b5fd" stroke-width="1" opacity="0.5"/>
  <line x1="21.5" y1="44" x2="28.5" y2="28" stroke="#c4b5fd" stroke-width="0.8" opacity="0.3"/>
  <line x1="21.5" y1="44" x2="28.5" y2="40" stroke="#c4b5fd" stroke-width="1.2" opacity="0.6"/>
  <line x1="21.5" y1="44" x2="28.5" y2="50" stroke="#c4b5fd" stroke-width="1" opacity="0.5"/>
  <!-- Connections Layer 2→3 -->
  <line x1="35.5" y1="16" x2="42.5" y2="24" stroke="#c4b5fd" stroke-width="1" opacity="0.5"/>
  <line x1="35.5" y1="28" x2="42.5" y2="24" stroke="#c4b5fd" stroke-width="1.2" opacity="0.7"/>
  <line x1="35.5" y1="28" x2="42.5" y2="40" stroke="#c4b5fd" stroke-width="1.2" opacity="0.7"/>
  <line x1="35.5" y1="40" x2="42.5" y2="40" stroke="#c4b5fd" stroke-width="1" opacity="0.5"/>
  <line x1="35.5" y1="50" x2="42.5" y2="40" stroke="#c4b5fd" stroke-width="0.8" opacity="0.3"/>
  <line x1="35.5" y1="16" x2="42.5" y2="40" stroke="#c4b5fd" stroke-width="0.6" opacity="0.2"/>
  <!-- Glow effect on center node -->
  <circle cx="32" cy="28" r="7" fill="#a78bfa" opacity="0.15"/>
  <circle cx="32" cy="28" r="4" fill="white" opacity="0.3"/>
</svg>
